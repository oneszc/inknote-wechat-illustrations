    <line x1="92" y1="0" x2="92" y2="705" stroke="#c23a78" stroke-width="4"/>
    <text x="160" y="112" class="label" font-size="64">远程环境继续跑</text>
    <text x="166" y="162" class="small" font-size="28">笔记本、Mac mini、远程主机都能接入</text>
    <g transform="translate(158 250)">
      <path class="ink" d="M20 28 C118 6 240 10 322 30 C336 112 330 216 312 286 C214 302 100 298 14 278 C0 190 2 94 20 28Z"/>
      <text x="64" y="114" class="small" font-size="34">手机</text>
