    </g>
    <g transform="translate(710 236)">
      <path class="ink" d="M28 28 C124 8 246 8 344 28 C360 128 350 248 330 330 C222 350 108 344 18 324 C0 220 2 104 28 28Z"/>
      <rect class="blue" x="70" y="88" width="212" height="126" rx="10"/>
      <text x="104" y="164" class="small" font-size="32">Remote SSH</text>
      <rect class="yellow" x="104" y="244" width="150" height="48" rx="10"/>
      <text x="132" y="278" class="small" font-size="25">运行中</text>
    </g>
    <path class="ink" d="M496 390 C558 342 620 330 696 354"/>
    <path class="ink" d="M666 320 L700 354 L656 364"/>
    <path class="thin" d="M512 455 C580 504 662 498 724 456"/>
