<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Work anywhere with Codex doodle">
  <defs>
    <pattern id="rule" width="1200" height="42" patternUnits="userSpaceOnUse">
      <line x1="0" y1="41" x2="1200" y2="41" stroke="#8ec7d3" stroke-width="2"/>
    </pattern>
    <style>
      .paper{fill:#fffdf8}.ink{fill:none;stroke:#111;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.thin{fill:none;stroke:#111;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}.blue{fill:#cbeefa;stroke:#111;stroke-width:5}.yellow{fill:#ffe779;stroke:#111;stroke-width:5}.red{fill:#f45c50;stroke:#111;stroke-width:5}.label{font-family:"Arial Rounded MT Bold","PingFang SC",sans-serif;font-weight:800;fill:#111}.small{font-family:"PingFang SC",sans-serif;font-weight:700;fill:#111}
    </style>
  </defs>
  <rect width="1200" height="800" fill="#eeeeec"/>
  <g transform="translate(70 46) rotate(1 530 355)">
    <rect class="paper" width="1060" height="705"/>
    <rect width="1060" height="705" fill="url(#rule)" opacity=".9"/>
    <line x1="92" y1="0" x2="92" y2="705" stroke="#c23a78" stroke-width="4"/>
    <text x="160" y="110" class="label" font-size="64">随时接住进展</text>
    <text x="166" y="160" class="small" font-size="28">查看、回复、批准，不用回到电脑前</text>
    <g transform="translate(160 218)">
      <path class="ink" d="M40 0 C142 -10 238 -8 320 8 C338 112 334 250 310 352 C220 370 116 366 24 348 C4 244 6 98 40 0Z"/>
      <rect class="blue" x="72" y="54" width="206" height="248" rx="24"/>
      <path class="thin" d="M104 96 L244 96 M104 142 L222 142 M104 188 L250 188"/>
      <rect class="yellow" x="108" y="230" width="120" height="44" rx="10"/>
      <text x="126" y="262" class="small" font-size="23">批准</text>
    </g>
    <g transform="translate(604 245)">
      <path class="ink" d="M22 28 C160 12 300 16 384 36 C396 116 390 214 372 286 C238 308 116 300 12 280 C0 188 4 94 22 28Z"/>
      <text x="68" y="92" class="small" font-size="32">终端输出</text>
      <text x="68" y="152" class="small" font-size="32">Diff</text>
      <text x="68" y="212" class="small" font-size="32">测试结果</text>
      <path class="thin" d="M250 82 h64 M250 142 h64 M250 202 h64"/>
    </g>
    <path class="ink" d="M508 392 C560 352 586 352 622 368"/>
    <path class="ink" d="M600 342 L624 370 L588 380"/>
    <text x="156" y="640" class="small" font-size="24">用途：文章第一节，说明移动端不是遥控器，而是完整工作入口。</text>
  </g>
</svg>
