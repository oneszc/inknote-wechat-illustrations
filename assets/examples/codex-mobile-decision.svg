<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Decision moment with Codex doodle">
  <defs>
    <pattern id="rule" width="1200" height="42" patternUnits="userSpaceOnUse">
      <line x1="0" y1="41" x2="1200" y2="41" stroke="#8ec7d3" stroke-width="2"/>
    </pattern>
    <style>
      .paper{fill:#fffdf8}.ink{fill:none;stroke:#111;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.thin{fill:none;stroke:#111;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}.blue{fill:#cbeefa;stroke:#111;stroke-width:5}.green{fill:#bfe8a8;stroke:#111;stroke-width:5}.red{fill:#f45c50;stroke:#111;stroke-width:5}.label{font-family:"Arial Rounded MT Bold","PingFang SC",sans-serif;font-weight:800;fill:#111}.small{font-family:"PingFang SC",sans-serif;font-weight:700;fill:#111}
    </style>
  </defs>
  <rect width="1200" height="800" fill="#eeeeec"/>
  <g transform="translate(70 46) rotate(-1 530 355)">
    <rect class="paper" width="1060" height="705"/>
    <rect width="1060" height="705" fill="url(#rule)" opacity=".9"/>
    <line x1="92" y1="0" x2="92" y2="705" stroke="#c23a78" stroke-width="4"/>
    <text x="160" y="112" class="label" font-size="64">关键时刻介入</text>
    <text x="166" y="162" class="small" font-size="28">Codex 卡住时，你在手机上选方向</text>
    <g transform="translate(150 245)">
      <path class="ink" d="M30 18 C126 2 254 6 348 22 C358 116 350 238 334 314 C230 330 118 326 18 306 C2 206 2 96 30 18Z"/>
      <text x="58" y="84" class="small" font-size="34">方案 A</text>
      <text x="58" y="146" class="small" font-size="26">快，改动少</text>
      <path class="thin" d="M56 210 L280 210"/>
      <path class="thin" d="M56 250 L236 250"/>
    </g>
    <g transform="translate(556 245)">
      <path class="ink" d="M24 22 C138 4 268 10 376 28 C386 126 380 238 358 314 C244 330 128 326 18 306 C4 208 2 90 24 22Z"/>
      <text x="60" y="84" class="small" font-size="34">方案 B</text>
      <text x="60" y="146" class="small" font-size="26">稳，结构清楚</text>
      <path class="green" d="M244 206 l38 38 l84 -112"/>
      <text x="60" y="254" class="small" font-size="30">继续</text>
    </g>
    <path class="ink" d="M486 420 C508 386 520 360 532 320"/>
    <path class="ink" d="M506 334 L532 318 L542 350"/>
    <text x="156" y="640" class="small" font-size="24">用途：通勤、会议间隙等场景，强调人只做判断，Codex 继续推进。</text>
  </g>
</svg>
